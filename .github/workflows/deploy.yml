name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: '部署 Worker API'
        required: false
        default: 'true'
        type: boolean
      deploy_pages:
        description: '部署前端 Pages'
        required: false
        default: 'true'
        type: boolean
env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  typecheck:
    name: 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: typecheck
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_pages == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  build-worker:
    name: 构建 Worker
    runs-on: ubuntu-latest
    needs: typecheck
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_worker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: cd worker && npm ci
      - run: cd worker && npx wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-worker:
    name: 部署 Worker API
    runs-on: ubuntu-latest
    needs: build-worker
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_worker == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: cd worker && npm ci
      - name: 部署 Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    name: 部署前端 Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_pages == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=logistics-tracker
