name = "logistics-tracker-cron"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 */4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "logistics-tracker-db"
database_id = "eca649bb-bd7b-43c5-be4f-6102a2df41c9"

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# - TRACK17_API_KEY: 17track API key for tracking requests
