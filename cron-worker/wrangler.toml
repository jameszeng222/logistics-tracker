name = "logistics-tracker-cron"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 */4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "logistics-tracker-db"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# - TRACK17_API_KEY: 17track API key for tracking requests
